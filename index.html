<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IVC Logo Reveal | Innovators and Visionaries Club</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Michroma&family=Syncopate:wght@400;700&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>

<body>

    <!-- Fixed viewport that stays in place -->
    <div id="viewport">

        <!-- Background grid lines -->
        <div class="bg-grid"></div>

        <!-- Curtains (visible at start) -->
        <div id="left-curtain" class="curtain"></div>
        <div id="right-curtain" class="curtain"></div>

        <!-- Countdown numbers (on top of curtains) -->
        <div id="countdown">
            <span id="num3" class="count-num active">3</span>
            <span id="num2" class="count-num">2</span>
            <span id="num1" class="count-num">1</span>
        </div>

        <!-- Logo (hidden behind curtains initially) -->
        <div id="logo-area">
            <div class="glass-ring">
                <img src="gear_frame.png" alt="Gear Frame" class="gear-img">
                <img src="brain_icon.png" alt="Brain" class="icon-img brain-img">
                <img src="bulb_icon.png" alt="Lightbulb" class="icon-img bulb-img">
                <img src="wrench_icon.png" alt="Wrench" class="icon-img wrench-img">
            </div>
        </div>

        <!-- Title text -->
        <div id="title-area">
            <h1 id="main-title">INNOVATORS & VISIONARIES CLUB</h1>
            <p id="tagline">IDEATE &bull; VISUALIZE &bull; CREATE</p>
        </div>


    </div>

    <!-- Spacer to allow scrolling -->
    <div id="spacer"></div>

    <script src="script.js"></script>
</body>

</html>
